<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansh Home</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: red;
        }
        .ul{
            display: flex;
            justify-content: space-around;
            list-style-type: none;
        }
        .li{
            border: 2px solid black;
            font-size: 30px;
            padding: 5px;
            margin: 15px;
            background-color: rgb(110, 110, 110);
            text-align: center;
        }
        .li:hover{
            border: 4px solid black;
            font-weight: bold;
        }
        .a{
            text-decoration:none;
            color: yellow;
        }
    </style>
</head>
<body>
    <div class="body">
        <div class="nav">
            <nav class="nav">
                <ul class="ul">
                    <li class="li"><a href="#" class="a">Home</a></li>
                    <li class="li"><a href="#" class="a">Projects</a></li>
                </ul>
            </nav>
        </div>
    </div>    
</body>
</html>
